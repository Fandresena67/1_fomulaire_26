    <title>Formulaire</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-image: url(photo/D.png);
            font-family: Arial, Helvetica, sans-serif;
        }
        form{
            background-color: white;
            text-align: center;
            align-items: center;
            width: 500px;
            height: 670px;
            margin-left: 470px;
            margin-top: 10px;
            padding-top: 40px;
            box-shadow: 0 4px 12px 0 black;
            border-radius: 7px;

        }

        form input{
            border-radius: 5px;
            padding: 5px;

        }
        input:invalid, textarea:invalid{ border: 2px solid red;}
        input:valid, textarea:valid{border: 2px solid green;}

        /* @media(min-width:414px){

                margin-left: 30px;

            }           
        } 
@media(min-width: 1900px){
            form{
                align-items: center;
                margin-left: 500px;
                width: 300px;
                font-size: 12px;   
            }           
        } 
@media(min-width: 700px){
            form{

</head>
<body>
    <form action="https://formspree.io/f/mvzvnjgg" method="post">
        
        Nom <span style="color: red;">*</span> <br>
        <input type="text" name="nom" placeholder="Entrez votre nom" required style="text-align: center;"> <br><br><br>
        Prénom <span style="color: red;">*</span> <br>
        <input type="text" name="prenom" placeholder="Entrez votre prénom" required style="text-align: center;"><br><br><br>
        
        Numéro <span style="color: red;">*</span> <br>
        <input type="tel" name="tel" pattern="\d{10}" placeholder="0343603832" required title="10 chiffres" style="text-align: center;"> <br><br><br>
        Adresse <span style="color: red;">*</span> <br>
        <input type="text" name="adresse" placeholder="Adresse" required style="text-align: center;"><br> <br><br>

        Choisissez le genre <span style="color: red;">*</span> <br>
        <label for="">
            <input type="radio" name="genre" value="Homme"> Homme 
        </label><br>
        <label for=""><input type="radio" name="genre" value="Femme">Femme</label> <br><br>

        <label for="">Situation familiale</label>
        <select name="statut" id="" style="padding: 5px;" required>
            
            <option value="Célibateur">Célibataire</option>
            <option value="Marié(e)">Marié(e)</option>
            
        </select> <br><br><br>
        Message <span style="color: red;">*</span> <br>
        <textarea name="message" maxlength="100" placeholder="Votre message(100 caractères max)" required 
        style="padding: 7px; border-radius: 5px;"></textarea> <br><br>
        

        <button type="submit" style="padding: 7px; font-size: 18px; background: yellow; border-radius: 7px; margin-top: 50px; box-shadow: 0 4px 8px 0px black;" class="btn">Envoyé</button>


    </form>
